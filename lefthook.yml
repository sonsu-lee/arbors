pre-commit:
  parallel: true
  jobs:
    - name: format
      run: pnpm format
      stage_fixed: true

    - name: lint
      run: pnpm lint

    - name: typecheck
      run: pnpm typecheck

pre-push:
  parallel: true
  jobs:
    - name: test
      run: pnpm test

    - name: build
      run: pnpm build
